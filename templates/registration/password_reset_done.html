{% extends 'base.html' %}

{% block title %}Reset Link Sent - CricStake{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <div class="glass-panel p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden text-center">
        <!-- Glowing Accent -->
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/10 rounded-full filter blur-xl"></div>
        
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-3xl">
                ✉️
            </div>
        </div>

        <h2 class="text-3xl font-black font-outfit text-white mb-4">Reset Email Sent</h2>
        <p class="text-gray-400 text-sm leading-relaxed mb-8">
            We have sent an email to the address provided with instructions to reset your password. Please check your inbox and spam folder.
        </p>

        <a href="{% url 'login' %}" 
           class="w-full block bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold py-3.5 rounded-xl transition duration-200 text-center border border-indigo-500">
            Back to Sign In
        </a>
    </div>
</div>
{% endblock %}
