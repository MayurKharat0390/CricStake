{% extends 'base.html' %}

{% block title %}Reset Password - CricStake{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <div class="glass-panel p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
        <!-- Glowing Accent -->
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-indigo-500/10 rounded-full filter blur-xl"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black font-outfit text-white mb-2">Reset Password</h2>
            <p class="text-gray-400 text-sm">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Email -->
            <div>
                <label for="id_email" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" name="email" id="id_email" required
                           class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                           placeholder="Enter your registered email">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold py-3.5 rounded-xl transition duration-200 neon-glow-indigo border border-indigo-500">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-white/5">
            <span class="text-gray-400 text-sm">Remember your password?</span>
            <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
