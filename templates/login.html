{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Login - CricStake{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <div class="glass-panel p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
        <!-- Glowing Accent -->
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-indigo-500/10 rounded-full filter blur-xl"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black font-outfit text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400 text-sm">Enter your credentials to access CricStake</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Username -->
            <div>
                <label for="username" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Username</label>
                <div class="relative">
                    <input type="text" name="username" id="username" required
                           class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                           placeholder="Enter your username">
                </div>
            </div>

            <!-- Password -->
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label for="password" class="block text-xs uppercase tracking-wider text-gray-400 font-bold">Password</label>
                    <a href="{% url 'password_reset' %}" class="text-xs text-indigo-400 hover:text-indigo-300 font-bold transition">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" name="password" id="password" required
                           class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                           placeholder="Enter your password">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold py-3.5 rounded-xl transition duration-200 neon-glow-indigo border border-indigo-500">
                Sign In
            </button>
        </form>

        <div class="relative flex py-4 items-center">
            <div class="flex-grow border-t border-white/5"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-xs font-bold uppercase tracking-wider">Or</span>
            <div class="flex-grow border-t border-white/5"></div>
        </div>

        <a href="{% provider_login_url 'google' %}"
           class="w-full flex items-center justify-center space-x-3 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-200 font-bold py-3.5 rounded-xl transition duration-200">
            <!-- Google Logo SVG -->
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
        </a>

        <div class="text-center mt-6 pt-6 border-t border-white/5">
            <span class="text-gray-400 text-sm">Don't have an account?</span>
            <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
