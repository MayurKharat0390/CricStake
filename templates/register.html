{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Sign Up - CricStake{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-8">
    <div class="glass-panel p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
        <!-- Glowing Accent -->
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/10 rounded-full filter blur-xl"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black font-outfit text-white mb-2">Claim Your Coins</h2>
            <p class="text-gray-400 text-sm">Register now and receive 1,000 virtual CricCoins</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <!-- Username -->
            <div>
                <label for="username" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Username</label>
                <input type="text" name="username" id="username" required
                       class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                       placeholder="Choose a username">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Email Address</label>
                <input type="email" name="email" id="email" required
                       class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                       placeholder="yourname@example.com">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Password</label>
                <input type="password" name="password" id="password" required
                       class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                       placeholder="Create a password">
            </div>

            <!-- Password Confirm -->
            <div>
                <label for="password_confirm" class="block text-xs uppercase tracking-wider text-gray-400 font-bold mb-2">Confirm Password</label>
                <input type="password" name="password_confirm" id="password_confirm" required
                       class="w-full bg-obsidian-950/80 border border-white/10 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition"
                       placeholder="Re-type your password">
            </div>

            <!-- Submit -->
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white font-bold py-3.5 rounded-xl transition duration-200 neon-glow-indigo border border-indigo-500">
                Claim 1,000 Coins & Register
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-white/5">
            <span class="text-gray-400 text-sm">Already have an account?</span>
            <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
